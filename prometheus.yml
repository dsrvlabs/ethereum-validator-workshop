global:
  scrape_interval: 15s

scrape_configs:
  - job_name: geth
    metrics_path: /debug/metrics/prometheus
    static_configs:
      - targets: ['geth:6060']

  - job_name: lighthouse-beacon
    static_configs:
      - targets: ['beacon:5054']

  - job_name: lighthouse-validator
    static_configs:
      - targets: ['validator:5064']
